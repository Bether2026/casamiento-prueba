<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0805">
<title>Trivia · Sofía & Andrés</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --noir:#0a0805; --noir-2:#14100a; --ink:#1f1812;
  --ivory:#f6efe2; --champagne:#efe2c6;
  --gold:#c8a665; --gold-2:#dcc18a; --gold-deep:#826636;
  --gold-line:rgba(200,166,101,.22); --gold-line-2:rgba(200,166,101,.4);
  --serif:'Cormorant Garamond', serif;
  --display:'Italiana', 'Cormorant Garamond', serif;
  --caps:'Cinzel', serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ background: var(--noir); }
body{
  font-family:var(--serif); color:var(--ivory);
  min-height:100svh; overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
button{ font-family:inherit; cursor:pointer; }

/* BG */
.bg{
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  background: radial-gradient(ellipse 90% 60% at 50% 0%, #1a120a 0%, #0a0805 55%, #060403 100%);
}
.bg-silk{
  position:absolute; inset:-20%; filter:blur(60px); opacity:.85;
  background:
    radial-gradient(circle at 22% 18%, rgba(200,166,101,.22), transparent 38%),
    radial-gradient(circle at 78% 26%, rgba(141, 90, 50,.18), transparent 42%),
    radial-gradient(circle at 30% 70%, rgba(80, 40, 30,.22), transparent 45%),
    radial-gradient(circle at 84% 78%, rgba(200,166,101,.12), transparent 40%);
  animation: silkDrift 32s ease-in-out infinite alternate;
}
.bg-silk-2{
  position:absolute; inset:-30%; filter:blur(85px); opacity:.5; mix-blend-mode:screen;
  background:
    radial-gradient(circle at 60% 30%, rgba(220,193,138,.16), transparent 40%),
    radial-gradient(circle at 20% 80%, rgba(180,130,80,.14), transparent 45%);
  animation: silkDrift2 46s ease-in-out infinite alternate;
}
@keyframes silkDrift{ 0%{transform:translate3d(-3%,-2%,0) rotate(0deg) scale(1.05)} 50%{transform:translate3d(2%,3%,0) rotate(8deg) scale(1.12)} 100%{transform:translate3d(-2%,1%,0) rotate(-4deg) scale(1.08)} }
@keyframes silkDrift2{ 0%{transform:translate3d(4%,2%,0) rotate(-6deg) scale(1.1)} 100%{transform:translate3d(-3%,-2%,0) rotate(10deg) scale(1.18)} }
.bg-grain{
  position:absolute; inset:0; opacity:.18; mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 .8  0 0 0 0 .68  0 0 0 0 .4  0 0 0 .6 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
.bg-vignette{ position:absolute; inset:0; background: radial-gradient(ellipse 75% 60% at 50% 50%, transparent 50%, rgba(0,0,0,.55) 100%); }
#dustCanvas{ position:fixed; inset:0; z-index:1; pointer-events:none; }

/* BACK */
.back-link{
  position:fixed; top: max(1rem, env(safe-area-inset-top, 0));
  left:1.2rem; z-index:50;
  font-family:var(--caps); font-size:.55rem; letter-spacing:.4em;
  color: rgba(200,166,101,.55); text-decoration:none;
  padding: .65rem .85rem;
  border-radius:2px;
  transition: color .3s, background .3s;
}
.back-link:hover{ color: var(--gold); background: rgba(200,166,101,.06); }

/* SHELL */
.container{
  position:relative; z-index:2;
  min-height:100svh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 4rem 1.4rem 3rem;
}
.screen{
  width:100%; max-width: 560px;
  text-align:center;
  display:none;
}
.screen.active{ display:block; animation: fadeUp .6s var(--ease); }
@keyframes fadeUp{ from{opacity:0; transform: translateY(20px)} to{opacity:1; transform: translateY(0)} }

/* TYPE */
.kicker{
  font-family:var(--caps); font-size:.55rem;
  letter-spacing:.5em; color: var(--gold); opacity:.85;
  display:flex; align-items:center; justify-content:center; gap:.7rem;
}
.kicker::before, .kicker::after{ content:''; height:1px; width:24px;
  background:linear-gradient(90deg, transparent, var(--gold-line-2)); }
.kicker::after{ background:linear-gradient(90deg, var(--gold-line-2), transparent); }

.h1{
  font-family:var(--display);
  font-size: clamp(2.4rem, 9vw, 4rem);
  color: var(--champagne); line-height:1.05;
  margin-top: 1rem;
}
.h1 em{ font-family:var(--serif); font-style:italic; font-weight:300; color: var(--gold); }
.orn{ display:flex; align-items:center; justify-content:center; gap:1rem; margin: 1.4rem auto 2rem; }
.orn-line{ flex:0 0 60px; height:1px; background:linear-gradient(90deg, transparent, var(--gold), transparent); position:relative; overflow:hidden; }
.orn-line::after{ content:''; position:absolute; inset:0; background:linear-gradient(90deg, transparent, var(--gold-2) 50%, transparent); transform:translateX(-100%); animation: ornSweep 4.5s ease-in-out infinite; }
@keyframes ornSweep{ 0%{transform:translateX(-100%)} 60%,100%{transform:translateX(100%)} }
.orn-mark{ width:14px; height:14px; color:var(--gold); }
.orn-mark svg{ width:100%; height:100%; }

.sub{
  font-family:var(--serif); font-style:italic;
  font-size: 1.05rem; line-height:1.75;
  color: rgba(246,239,226,.65);
  margin: 0 auto 2.5rem;
  max-width: 32ch;
}

/* MONOGRAM (intro) */
.mono{
  width: 76px; height: 76px;
  margin: 0 auto 1.4rem;
  border-radius:50%;
  border: 1px solid var(--gold-line-2);
  display:flex; align-items:center; justify-content:center;
  background: rgba(200,166,101,.05);
}
.mono svg{ width:42px; height:42px; }
.mono path{ stroke: var(--gold); stroke-width:.7; fill:none; }

/* START BTN */
.btn{
  display:inline-flex; align-items:center; gap:.55rem;
  padding: .95rem 2.2rem;
  font-family:var(--caps);
  font-size:.66rem; letter-spacing:.32em;
  border-radius:2px;
  transition: all .3s var(--ease);
  border:1px solid transparent;
  text-decoration:none; cursor:pointer;
}
.btn-primary{ background: var(--gold); color: var(--noir); border-color: var(--gold); }
.btn-primary:hover{ background: var(--gold-2); border-color: var(--gold-2); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(200,166,101,.28); }
.btn-ghost{ background: transparent; color: var(--gold); border-color: var(--gold-line-2); }
.btn-ghost:hover{ border-color: var(--gold); background: rgba(200,166,101,.08); transform: translateY(-2px); }
.btn-soft{ background: transparent; color: var(--champagne); border-color: var(--gold-line); }
.btn-soft:hover{ border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }

/* PROGRESS */
.progress-wrap{ margin-bottom: 2.4rem; }
.progress-text{
  font-family:var(--caps); font-size:.5rem;
  letter-spacing:.45em; color: rgba(200,166,101,.55);
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom: .8rem;
}
.progress-text .total{ color: rgba(246,239,226,.4); }
.progress-bar{
  height: 2px; background: rgba(200,166,101,.14); border-radius:1px;
  overflow:hidden; position:relative;
}
.progress-bar-fill{
  height:100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-2));
  border-radius:1px;
  transition: width .55s var(--ease);
  position:relative;
}
.progress-bar-fill::after{
  content:''; position:absolute; right:0; top:50%; transform: translate(50%,-50%);
  width:7px; height:7px; border-radius:50%;
  background: var(--gold-2);
  box-shadow: 0 0 12px var(--gold);
}

/* QUESTION */
.q-num{
  font-family:var(--caps); font-size:.55rem;
  letter-spacing:.5em; color: var(--gold);
  opacity:.7; margin-bottom: .8rem;
}
.q-text{
  font-family:var(--display);
  font-size: clamp(1.5rem, 5vw, 2.1rem);
  color: var(--champagne); line-height:1.3;
  margin-bottom: 2rem;
  text-wrap: pretty;
}

/* OPTIONS */
.options{ display:flex; flex-direction:column; gap: .7rem; }
.opt{
  display:flex; align-items:center; gap: .9rem;
  padding: 1rem 1.3rem;
  border: 1px solid var(--gold-line);
  background: transparent;
  font-family: var(--serif); font-size: 1.05rem;
  color: rgba(246,239,226,.75);
  text-align:left; border-radius:2px;
  transition: all .28s var(--ease);
  position:relative; overflow:hidden;
}
.opt::before{
  content:''; position:absolute; inset:0;
  background: rgba(200,166,101,.07);
  transform: scaleX(0); transform-origin:left;
  transition: transform .3s var(--ease);
}
.opt:hover::before{ transform: scaleX(1); }
.opt:hover{ border-color: var(--gold-line-2); color: var(--champagne); }
.opt-letter{
  width: 24px; height: 24px;
  border:1px solid var(--gold-line-2);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--caps); font-size:.55rem; letter-spacing:.05em;
  color: var(--gold); flex-shrink:0;
  position:relative; z-index:1;
}
.opt-text{ position:relative; z-index:1; }
.opt.correct{
  border-color: rgba(143,214,173,.55);
  background: rgba(143,214,173,.08);
  color: #bfe8d2;
}
.opt.correct .opt-letter{ border-color: #8fd6ad; color: #8fd6ad; background: rgba(143,214,173,.1); }
.opt.wrong{
  border-color: rgba(214,143,143,.55);
  background: rgba(214,143,143,.08);
  color: #e0bdbd;
}
.opt.wrong .opt-letter{ border-color: #d68f8f; color: #d68f8f; background: rgba(214,143,143,.1); }
.opt.reveal{
  border-color: var(--gold);
  background: rgba(200,166,101,.08);
  color: var(--gold-2);
}
.opt.reveal .opt-letter{ border-color: var(--gold); color: var(--gold); background: rgba(200,166,101,.1); }
.opt.disabled{ pointer-events:none; }

/* FEEDBACK */
.feedback{
  margin-top: 1.5rem; min-height: 3.2rem;
  font-family:var(--serif); font-style:italic;
  font-size: 1rem; color: var(--champagne);
  line-height: 1.6; opacity:0;
  transition: opacity .45s; text-align: left;
  padding: 1rem 1.2rem;
  border-left: 1px solid var(--gold-line-2);
  background: rgba(200,166,101,.04);
  border-radius: 0 2px 2px 0;
}
.feedback.show{ opacity:1; }
.feedback-mark{
  font-family:var(--caps); font-size:.55rem;
  letter-spacing:.42em; color: var(--gold);
  margin-bottom: .4rem; display:block;
}

.btn-next{
  margin-top: 1.6rem;
  opacity:0; pointer-events:none;
  transition: opacity .4s, transform .3s, box-shadow .3s;
}
.btn-next.show{ opacity:1; pointer-events:all; }

/* RESULT */
.result-emblem{
  width: 110px; height: 110px;
  margin: 0 auto 1.5rem;
  border-radius:50%;
  border: 1px solid var(--gold-line-2);
  display:flex; align-items:center; justify-content:center;
  background: rgba(200,166,101,.05);
  position:relative;
}
.result-emblem::before{
  content:''; position:absolute; inset:-7px;
  border-radius:50%;
  border: 1px solid var(--gold-line);
  animation: pulseRing 3s ease-in-out infinite;
}
@keyframes pulseRing{ 0%,100%{transform:scale(1); opacity:.3} 50%{transform:scale(1.05); opacity:.8} }
.result-emblem svg{ width: 56px; height: 56px; }
.result-emblem path{ stroke: var(--gold); stroke-width:.7; fill: none; }

.result-stars{
  display:flex; justify-content:center; gap: .5rem;
  margin: .8rem 0 1.2rem; color: var(--gold);
}
.result-stars svg{ width: 22px; height: 22px; }
.result-stars .empty{ color: rgba(200,166,101,.2); }

.result-score{
  font-family:var(--display);
  font-size: clamp(4.5rem, 16vw, 7rem);
  color: var(--gold); line-height:1;
  display:block;
  background: linear-gradient(180deg, #faf2dc 0%, #efd8a2 55%, #c8a665 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.result-total{
  font-family:var(--caps); font-size:.55rem;
  letter-spacing:.5em; color: rgba(200,166,101,.5);
  margin-top: .4rem;
}
.result-msg{
  font-family:var(--display);
  font-size: clamp(1.3rem, 4vw, 1.7rem);
  color: var(--champagne); line-height:1.4;
  margin: 1.4rem auto .8rem; max-width: 28ch;
  text-wrap:pretty;
}
.result-sub{
  font-family:var(--serif); font-style:italic;
  font-size: 1rem; color: rgba(246,239,226,.55);
  max-width: 30ch; margin: 0 auto;
}
.result-actions{
  display:flex; gap:.7rem; flex-wrap:wrap;
  justify-content:center; margin-top: 2rem;
}

/* CONFETTI */
.confetti{
  position:fixed; top:-10px; width:8px; height:8px;
  pointer-events:none; z-index:999; opacity:0;
  animation: confettiFall 3s ease-in forwards;
}
@keyframes confettiFall{ 0%{transform:translateY(0) rotate(0deg); opacity:1} 100%{transform:translateY(110vh) translateX(var(--cx)) rotate(var(--cr)); opacity:0} }

@media (prefers-reduced-motion: reduce){
  .bg-silk, .bg-silk-2, .orn-line::after, .result-emblem::before{ animation:none; }
}
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg" aria-hidden="true">
  <div class="bg-silk"></div>
  <div class="bg-silk-2"></div>
  <div class="bg-grain"></div>
  <div class="bg-vignette"></div>
</div>
<canvas id="dustCanvas" aria-hidden="true"></canvas>

<a href="index.html" class="back-link">← VOLVER</a>

<div class="container">

  <!-- INTRO -->
  <section class="screen active" id="screenIntro">
    <div class="mono">
      <svg viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" stroke-dasharray="2 3" stroke="currentColor" stroke-width=".7" fill="none" style="stroke:var(--gold);opacity:.5"/>
        <path d="M22 22 q-6 0 -6 6 q0 5 6 6 l4 1 q6 1 6 6 q0 6 -6 6 q-6 0 -9 -4"/>
        <path d="M40 42 l4 -20 l4 20 M42 35 h4"/>
      </svg>
    </div>
    <p class="kicker">SOFÍA &amp; ANDRÉS</p>
    <h1 class="h1">¿Cuánto los <em>conocés?</em></h1>
    <div class="orn">
      <span class="orn-line"></span>
      <span class="orn-mark"><svg viewBox="0 0 14 14"><path d="M7 1 L8.4 5.6 L13 7 L8.4 8.4 L7 13 L5.6 8.4 L1 7 L5.6 5.6 Z" fill="currentColor"/></svg></span>
      <span class="orn-line"></span>
    </div>
    <p class="sub">Poné a prueba tu amistad con los novios.<br>10 preguntas sobre su historia de amor.</p>
    <button class="btn btn-primary" onclick="startTrivia()">COMENZAR</button>
  </section>

  <!-- QUESTION -->
  <section class="screen" id="screenQuestion">
    <div class="progress-wrap">
      <div class="progress-text">
        <span id="progressText">PREGUNTA 01</span>
        <span class="total" id="progressTotal">DE 10</span>
      </div>
      <div class="progress-bar"><div class="progress-bar-fill" id="progressBar" style="width:10%"></div></div>
    </div>

    <p class="q-num" id="qNum">01 / 10</p>
    <h2 class="q-text" id="qText"></h2>
    <div class="options" id="opts"></div>
    <div class="feedback" id="feedback"><span class="feedback-mark" id="fbMark"></span><span id="fbText"></span></div>
    <button class="btn btn-ghost btn-next" id="btnNext" onclick="nextQuestion()">SIGUIENTE →</button>
  </section>

  <!-- RESULT -->
  <section class="screen" id="screenResult">
    <p class="kicker">RESULTADO FINAL</p>
    <div class="result-emblem" style="margin-top:1.4rem">
      <svg viewBox="0 0 64 64">
        <path d="M32 8 l6 14 l16 1 l-12 11 l4 16 l-14 -9 l-14 9 l4 -16 l-12 -11 l16 -1 z"/>
      </svg>
    </div>
    <div class="result-stars" id="resultStars"></div>
    <span class="result-score" id="resultScore">0</span>
    <p class="result-total" id="resultTotal">DE 10 CORRECTAS</p>
    <div class="orn">
      <span class="orn-line"></span>
      <span class="orn-mark"><svg viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" fill="none" stroke="currentColor"/></svg></span>
      <span class="orn-line"></span>
    </div>
    <p class="result-msg" id="resultMsg"></p>
    <p class="result-sub" id="resultSub"></p>
    <div class="result-actions">
      <button class="btn btn-ghost" onclick="restartTrivia()">JUGAR DE NUEVO</button>
      <a href="index.html" class="btn btn-soft">VOLVER A LA INVITACIÓN</a>
    </div>
  </section>

</div>

<script>
/* ══ DUST ══ */
try {
  const c = document.getElementById('dustCanvas');
  const ctx = c.getContext('2d');
  let W, H;
  const resize = () => {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = c.width = innerWidth * dpr; H = c.height = innerHeight * dpr;
    c.style.width = innerWidth + 'px'; c.style.height = innerHeight + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  };
  resize(); addEventListener('resize', resize);
  const N = Math.min(36, Math.max(18, Math.floor(innerWidth / 28)));
  const dust = [];
  for (let i = 0; i < N; i++) dust.push({
    x: Math.random()*innerWidth, y: Math.random()*innerHeight,
    r: .35 + Math.random()*1.3,
    vy: -.06 - Math.random()*.14, vx: (Math.random()-.5)*.04,
    ph: Math.random()*Math.PI*2, hue: Math.random() > .7
  });
  let last = 0;
  function frame(ts){
    if(!last) last = ts;
    const dt = Math.min(40, ts-last); last = ts;
    ctx.clearRect(0,0,innerWidth,innerHeight);
    for (const d of dust) {
      d.x += d.vx*dt*.08; d.y += d.vy*dt*.08; d.ph += .02;
      if (d.y < -10) { d.y = innerHeight + 10; d.x = Math.random()*innerWidth; }
      if (d.x < -10) d.x = innerWidth + 10;
      if (d.x > innerWidth+10) d.x = -10;
      const tw = .35 + .65 * (Math.sin(d.ph)*.5 + .5);
      const rg = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r*3);
      if (d.hue) {
        rg.addColorStop(0, `rgba(220,193,138,${0.55*tw})`);
        rg.addColorStop(0.5, `rgba(200,166,101,${0.18*tw})`);
      } else {
        rg.addColorStop(0, `rgba(255,250,238,${0.5*tw})`);
        rg.addColorStop(0.5, `rgba(220,200,160,${0.12*tw})`);
      }
      rg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r*3, 0, Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
} catch(e){}

/* ══ QUESTIONS ══ */
const QUESTIONS = [
  { q: "¿Dónde se conocieron Sofía y Andrés?",
    opts: ["En una boda de amigos","En la universidad","En un viaje","Por una app de citas"], answer: 0,
    fact: "Fue en la boda de sus mejores amigos. El destino los reunió bailando en la pista." },
  { q: "¿Cuánto tiempo llevan juntos antes de casarse?",
    opts: ["2 años","4 años","6 años","8 años"], answer: 1,
    fact: "Cuatro años de aventuras, viajes y amor que los convirtieron en mejores amigos." },
  { q: "¿En qué ciudad fue su primera cita?",
    opts: ["Buenos Aires","Mendoza","Bariloche","Córdoba"], answer: 2,
    fact: "Una escapada romántica a Bariloche que empezó todo: montañas, chocolate y amor." },
  { q: "¿Cuál es la canción que consideran 'suya'?",
    opts: ["Perfect — Ed Sheeran","Can't Help Falling in Love — Elvis","Tenerife Sea — Ed Sheeran","A Thousand Years — C. Perri"], answer: 2,
    fact: "Tenerife Sea sonó la noche que Andrés le dijo a Sofía que estaba enamorado de ella." },
  { q: "¿Cómo pidió Andrés matrimonio a Sofía?",
    opts: ["En un restaurante con mariachis","En una playa al atardecer","En casa con sus familias","En el lugar de su primera cita"], answer: 3,
    fact: "Volvieron a Bariloche, el lugar donde todo comenzó. Las montañas como testigos." },
  { q: "¿Qué tienen en común como hobby?",
    opts: ["Cocinar juntos","Senderismo","Fotografía","Todas las anteriores"], answer: 3,
    fact: "Pareja de mil hobbies. Se conocieron haciendo fotos y cocinan juntos cada domingo." },
  { q: "¿Cuál es el plato favorito de Sofía que Andrés aprendió a cocinar?",
    opts: ["Risotto de hongos","Ravioles de ricota","Tarta de manzana","Tiramisú"], answer: 1,
    fact: "Los ravioles de ricota caseros son el gesto de amor más delicioso de Andrés." },
  { q: "¿A qué país viajaron juntos por primera vez al exterior?",
    opts: ["Italia","Portugal","Perú","Japón"], answer: 2,
    fact: "Machu Picchu, el Titicaca y ceviche todos los días. Un viaje que los enamoró más." },
  { q: "¿Cuál es la mascota de la pareja?",
    opts: ["Un gato llamado Merlot","Un perro llamado Tango","Dos gatos","No tienen mascotas"], answer: 1,
    fact: "Tango es el golden retriever que adoptaron juntos. El primer gran paso de convivencia." },
  { q: "¿Qué frase describe mejor su amor?",
    opts: ["Amor a primera vista","Amigos antes que novios","Amor de película","Todo lo anterior"], answer: 3,
    fact: "Empezaron como amigos, se enamoraron como en las películas y se eligen cada día." }
];

let currentQ = 0, score = 0, answered = false, shuffled = [];

function shuffle(arr){
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

function startTrivia(){
  currentQ = 0; score = 0; answered = false;
  shuffled = shuffle(QUESTIONS);
  showScreen('screenQuestion');
  renderQuestion();
}

function renderQuestion(){
  const q = shuffled[currentQ];
  const total = shuffled.length;
  const num = String(currentQ+1).padStart(2,'0');

  document.getElementById('progressText').textContent = 'PREGUNTA ' + num;
  document.getElementById('progressTotal').textContent = 'DE ' + total;
  document.getElementById('progressBar').style.width = `${((currentQ+1)/total)*100}%`;
  document.getElementById('qNum').textContent = `${num} / ${total}`;
  document.getElementById('qText').textContent = q.q;

  const letters = ['A','B','C','D','E'];
  const cont = document.getElementById('opts');
  cont.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    btn.onclick = () => selectOption(i);
    cont.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.classList.remove('show');
  document.getElementById('fbMark').textContent = '';
  document.getElementById('fbText').textContent = '';

  const btnNext = document.getElementById('btnNext');
  btnNext.classList.remove('show');
  btnNext.textContent = currentQ < shuffled.length - 1 ? 'SIGUIENTE →' : 'VER RESULTADO →';
  answered = false;
}

function selectOption(chosen){
  if (answered) return;
  answered = true;
  const q = shuffled[currentQ];
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o => o.classList.add('disabled'));

  if (chosen === q.answer){
    score++;
    opts[chosen].classList.add('correct');
    document.getElementById('fbMark').textContent = '✓ CORRECTO';
    document.getElementById('fbText').textContent = q.fact;
  } else {
    opts[chosen].classList.add('wrong');
    opts[q.answer].classList.add('reveal');
    document.getElementById('fbMark').textContent = '✗ RESPUESTA CORRECTA';
    document.getElementById('fbText').textContent = q.fact;
  }
  document.getElementById('feedback').classList.add('show');
  document.getElementById('btnNext').classList.add('show');
}

function nextQuestion(){
  currentQ++;
  if (currentQ >= shuffled.length) showResults();
  else renderQuestion();
}

function showResults(){
  showScreen('screenResult');
  const total = shuffled.length;
  const pct = score / total;
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultTotal').textContent = `DE ${total} CORRECTAS`;

  // Stars
  const max = 5;
  const filled = Math.max(1, Math.round(pct * max));
  const starsEl = document.getElementById('resultStars');
  starsEl.innerHTML = '';
  for (let i = 0; i < max; i++){
    const star = document.createElementNS('http://www.w3.org/2000/svg','svg');
    star.setAttribute('viewBox','0 0 22 22');
    star.innerHTML = '<path d="M11 1 L13.2 8 L20.5 8 L14.6 12.4 L16.8 19.5 L11 15.1 L5.2 19.5 L7.4 12.4 L1.5 8 L8.8 8 Z" fill="currentColor"/>';
    if (i >= filled) star.classList.add('empty');
    starsEl.appendChild(star);
  }

  let msg, sub;
  if (pct === 1) { msg = '¡Sos el/la mejor amigo/a que podrían tener!'; sub = 'Los conocés como si los hubieras vivido. Te esperamos en la fiesta.'; launchConfetti(); }
  else if (pct >= .8) { msg = '¡Sos parte de su historia sin dudarlo!'; sub = 'Casi perfecto. Claramente los querés mucho y se nota.'; launchConfetti(); }
  else if (pct >= .6) { msg = 'Buen puntaje, claramente los seguís de cerca.'; sub = 'Hay algunas historias pendientes de compartir en la fiesta.'; }
  else if (pct >= .4) { msg = 'No está mal, pero hay secretos que no sabías.'; sub = 'La boda es la oportunidad perfecta para ponerse al día.'; }
  else { msg = '¡Mucho por aprender sobre los novios!'; sub = 'Eso sí… los querés igual. Y ellos a vos también.'; }
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultSub').textContent = sub;
}

function restartTrivia(){ startTrivia(); }

function launchConfetti(){
  const colors = ['#c8a665','#dcc18a','#efe2c6','#e6c376','#f6efe2'];
  for (let i = 0; i < 55; i++){
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti';
      p.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        --cx:${(Math.random()-.5)*200}px;
        --cr:${Math.random()*720-360}deg;
        animation-delay:${Math.random()*.8}s;
        animation-duration:${2.5+Math.random()*1.5}s;
        width:${5+Math.random()*7}px;
        height:${5+Math.random()*7}px;
        border-radius:${Math.random()>.5?'50%':'2px'};
      `;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 4500);
    }, i*40);
  }
}
</script>
