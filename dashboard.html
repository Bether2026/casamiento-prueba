<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0805">
<title>Panel · Sofía & Andrés</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --champagne:  #f0e6d3;
  --gold:       #c9a84c;
  --gold-2:     #e8c97a;
  --gold-deep:  #826636;
  --gold-line:  rgba(201,168,76,.22);
  --gold-line-2:rgba(201,168,76,.4);
  --ivory:      #faf7f2;
  --noir:       #0a0805;
  --noir-2:     #14100a;
  --ink:        #2d2418;
  --green:      #7ec49a;
  --red:        #c48080;
  --amber:      #c9913a;

  --serif:'Cormorant Garamond',serif;
  --caps:'Cinzel',serif;
  --sans:'Montserrat',sans-serif;

  --ease: cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ background: var(--noir); }
body{
  font-family: var(--sans); color: var(--champagne);
  overflow-x:hidden; min-height:100svh;
  -webkit-font-smoothing:antialiased;
}
button{ font-family:inherit; cursor:pointer; }
input{ font-family:inherit; }

/* ── BACKGROUND ── */
.bg{
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  background: radial-gradient(ellipse 90% 60% at 50% 0%, #1a120a 0%, #0a0805 55%, #060403 100%);
}
.bg-silk{
  position:absolute; inset:-20%; filter: blur(60px); opacity:.8;
  background:
    radial-gradient(circle at 22% 18%, rgba(201,168,76,.18), transparent 38%),
    radial-gradient(circle at 78% 26%, rgba(141, 90, 50,.15), transparent 42%),
    radial-gradient(circle at 30% 70%, rgba(80, 40, 30,.18), transparent 45%),
    radial-gradient(circle at 84% 78%, rgba(201,168,76,.1), transparent 40%);
  animation: silkDrift 36s ease-in-out infinite alternate;
}
@keyframes silkDrift{
  0%   { transform: translate3d(-3%,-2%,0) rotate(0deg)  scale(1.05); }
  100% { transform: translate3d(2%, 1%,0) rotate(6deg)   scale(1.12); }
}
.bg-grain{
  position:absolute; inset:0; opacity:.14; mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 .8  0 0 0 0 .68  0 0 0 0 .4  0 0 0 .55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
.bg-vignette{ position:absolute; inset:0; background: radial-gradient(ellipse 75% 60% at 50% 50%, transparent 50%, rgba(0,0,0,.55) 100%); }

/* ══════════════════════════════════════════════
   LOGIN
   ══════════════════════════════════════════════ */
#loginScreen{
  position: fixed; inset:0; z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: clamp(1.5rem,5vw,3rem);
  transition: opacity .8s var(--ease), transform .8s var(--ease);
}
#loginScreen.hide{ opacity:0; transform: scale(1.05); pointer-events:none; }

.login-mono{
  font-family: var(--caps); font-weight:500;
  font-size: clamp(2.6rem, 9vw, 3.6rem);
  color: transparent;
  -webkit-text-stroke: 1px rgba(201,168,76,.55);
  letter-spacing: .12em;
  line-height: 1; margin-bottom: .6rem;
}
.login-mono .amp{
  font-family: var(--serif); font-style:italic;
  font-size: .55em; color: var(--gold);
  -webkit-text-stroke: 0;
  vertical-align:.12em;
  margin: 0 .1em;
}
.login-eyebrow{
  font-family: var(--caps); font-size: .6rem;
  letter-spacing: .55em; color: var(--gold);
  opacity: .85; margin-bottom: .8rem;
}
.login-rule{
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 1.3rem;
}
.login-sub{
  font-family: var(--serif); font-style:italic;
  font-size: 1rem; color: rgba(240,230,211,.45);
  margin-bottom: 2.5rem; letter-spacing:.04em;
  text-align:center;
}
.login-card{
  width: min(380px, 88vw);
  padding: 2rem 2rem 1.8rem;
  background: linear-gradient(180deg, rgba(201,168,76,.05), rgba(201,168,76,0) 70%);
  border: 1px solid var(--gold-line);
  border-radius: 3px;
  text-align: center;
  position: relative;
  backdrop-filter: blur(10px);
}
.login-card::after{
  content:''; position:absolute; top:0; left:-100%; width:50%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,.06), transparent);
  animation: shimmer 6s ease-in-out infinite;
}
@keyframes shimmer{ 0%{left:-100%} 100%{left:220%} }
.login-label{
  font-family: var(--caps); font-size: .52rem;
  letter-spacing: .45em; color: var(--gold);
  opacity:.7; display:block; margin-bottom:1rem;
}
.login-input{
  width:100%;
  background: rgba(255,255,255,.03);
  border:1px solid var(--gold-line);
  border-radius: 2px;
  padding: .85rem 1rem;
  font-family: var(--serif);
  font-size: 1.15rem;
  color: var(--champagne); text-align:center;
  letter-spacing: .3em; outline: none;
  transition: border-color .3s;
}
.login-input:focus{ border-color: var(--gold-line-2); }
.login-input::placeholder{ color: rgba(240,230,211,.2); letter-spacing:.2em; }
.login-btn{
  margin-top: 1.2rem; width:100%;
  padding: .85rem;
  background: var(--gold); color: var(--noir);
  border: 1px solid var(--gold); border-radius: 2px;
  font-family: var(--caps);
  font-size: .62rem; letter-spacing: .32em;
  transition: all .3s var(--ease);
}
.login-btn:hover{
  background: var(--gold-2); border-color: var(--gold-2);
  transform: translateY(-1px);
  box-shadow: 0 10px 26px rgba(201,168,76,.26);
}
.login-err{
  font-family: var(--serif); font-style:italic;
  font-size: .9rem; color: #d68f8f;
  margin-top: .8rem; opacity:0; height: 1.2rem;
  transition: opacity .3s;
}
.login-err.vis{ opacity:1; }
.login-hint{
  margin-top: 2rem;
  font-family: var(--serif); font-style:italic;
  font-size: .82rem; color: rgba(201,168,76,.32);
  letter-spacing:.1em;
}

/* ══════════════════════════════════════════════
   DASHBOARD
   ══════════════════════════════════════════════ */
#dashboard{
  display:none; position:relative; z-index:1;
  padding-bottom: 4rem;
}
#dashboard.vis{ display:block; animation: fadeUp .8s var(--ease); }
@keyframes fadeUp{ from{opacity:0; transform: translateY(20px)} to{opacity:1; transform: translateY(0)} }

/* HEADER */
.dash-header{
  background: rgba(10,8,5,.85);
  border-bottom: 1px solid var(--gold-line);
  padding: 1.4rem clamp(1.4rem,5vw,2.5rem) 1.4rem;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(14px);
}
.dash-header-inner{
  max-width: 1200px; margin: 0 auto;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap: 1rem;
}
.dash-logo{
  font-family: var(--caps); font-weight:500;
  font-size: 1.4rem; letter-spacing:.1em;
  color: var(--gold); opacity:.85;
}
.dash-logo .amp{
  font-family: var(--serif); font-style:italic;
  font-size: .8em; vertical-align: .08em;
  margin: 0 .1em;
}
.dash-title-wrap{ text-align:center; flex:1; min-width:0; }
.dash-eyebrow{
  font-family: var(--caps); font-size: .5rem;
  letter-spacing: .5em; color: var(--gold); opacity:.65;
}
.dash-heading{
  font-family: var(--serif); font-weight:300;
  font-size: clamp(1.3rem, 3vw, 1.9rem);
  line-height:1.2; color: var(--champagne);
}
.dash-date{
  font-family: var(--caps); font-size: .48rem;
  letter-spacing: .42em; color: rgba(201,168,76,.45);
  margin-top: .35rem;
}
.header-actions{ display:flex; gap:.5rem; }
.header-btn{
  font-family: var(--caps); font-size: .48rem;
  letter-spacing: .35em;
  color: rgba(201,168,76,.45);
  background: transparent;
  border: 1px solid var(--gold-line);
  border-radius: 2px;
  padding: .5rem .9rem;
  transition: all .3s var(--ease);
  white-space:nowrap;
  text-decoration:none;
  display:inline-flex; align-items:center;
}
.header-btn:hover{ color: var(--gold); border-color: var(--gold-line-2); background: rgba(201,168,76,.04); }
.header-btn.primary{ color: var(--gold); border-color: var(--gold-line-2); }

/* STATS */
.stats-strip{
  max-width: 1200px; margin: 2.6rem auto 0;
  padding: 0 clamp(1.4rem,5vw,2.5rem);
  display:grid; grid-template-columns: repeat(4, 1fr);
  gap: .9rem;
}
@media(max-width:700px){ .stats-strip{ grid-template-columns: repeat(2,1fr); } }

.stat-card{
  background: linear-gradient(180deg, rgba(201,168,76,.04), rgba(201,168,76,0) 70%);
  border: 1px solid var(--gold-line);
  border-radius: 3px;
  padding: 1.5rem 1.2rem 1.3rem;
  text-align: center; position:relative; overflow:hidden;
  transition: border-color .3s var(--ease), transform .3s var(--ease), background .3s var(--ease);
}
.stat-card:hover{
  border-color: var(--gold-line-2);
  transform: translateY(-2px);
  background: linear-gradient(180deg, rgba(201,168,76,.08), rgba(201,168,76,0) 70%);
}
.stat-card::before{
  content:''; position:absolute; top:0; left:50%; transform: translateX(-50%);
  width:24px; height:1px; background: var(--gold);
}
.stat-icon{
  width:24px; height:24px; margin: 0 auto .8rem;
  color: var(--gold); opacity:.7;
}
.stat-icon svg{ width:100%; height:100%; stroke:currentColor; stroke-width:1; fill:none; }
.stat-num{
  display:block;
  font-family: var(--serif); font-weight:300;
  font-size: clamp(2.4rem, 5vw, 3.2rem);
  color: var(--champagne); line-height:1;
  font-variant-numeric: tabular-nums;
}
.stat-num.green{ color: var(--green); }
.stat-num.red{   color: var(--red); }
.stat-num.amber{ color: var(--gold); }
.stat-lbl{
  display:block; margin-top: .5rem;
  font-family: var(--caps); font-size: .48rem;
  letter-spacing: .42em; color: var(--gold-deep);
}

/* PROGRESS */
.progress-wrap{
  max-width: 1200px; margin: 2rem auto 0;
  padding: 0 clamp(1.4rem,5vw,2.5rem);
}
.progress-label{
  display:flex; justify-content:space-between; align-items:center;
  font-family: var(--caps); font-size: .5rem;
  letter-spacing: .42em; color: rgba(201,168,76,.55);
  margin-bottom: .7rem;
}
.progress-bar{
  height: 3px; background: rgba(201,168,76,.1);
  border-radius: 2px; overflow:hidden;
  position:relative;
}
.progress-fill{
  height:100%;
  background: linear-gradient(90deg, var(--green), var(--gold));
  border-radius: 2px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.progress-fill::after{
  content:''; position:absolute; right:0; top:50%; transform: translate(50%,-50%);
  width:8px; height:8px; border-radius:50%;
  background: var(--gold-2);
  box-shadow: 0 0 12px var(--gold);
}

/* CONTROLS */
.controls{
  max-width: 1200px; margin: 2.6rem auto 1.2rem;
  padding: 0 clamp(1.4rem,5vw,2.5rem);
  display:flex; flex-wrap:wrap; gap:.8rem;
  align-items:center; justify-content:space-between;
}
.filter-tabs{ display:flex; gap:.4rem; flex-wrap:wrap; }
.filter-tab{
  font-family: var(--caps); font-size: .5rem;
  letter-spacing: .32em;
  padding: .5rem 1rem;
  border: 1px solid var(--gold-line);
  border-radius: 2px;
  background: transparent;
  color: rgba(240,230,211,.5);
  transition: all .25s var(--ease);
}
.filter-tab:hover{ border-color: var(--gold-line-2); color: var(--champagne); }
.filter-tab.active{ background: rgba(201,168,76,.1); border-color: var(--gold); color: var(--gold); }

.search-wrap{ position:relative; }
.search-input{
  background: rgba(255,255,255,.03);
  border: 1px solid var(--gold-line);
  border-radius: 2px;
  padding: .5rem 1rem .5rem 2.4rem;
  font-family: var(--sans);
  font-size: .76rem;
  color: var(--champagne);
  outline: none;
  width: 220px;
  transition: border-color .3s var(--ease);
}
.search-input:focus{ border-color: var(--gold-line-2); }
.search-input::placeholder{ color: rgba(240,230,211,.22); }
.search-icon{
  position:absolute; left: .8rem; top:50%; transform: translateY(-50%);
  color: rgba(201,168,76,.5);
  width: 12px; height: 12px;
  pointer-events:none;
}
.search-icon svg{ width:100%; height:100%; stroke: currentColor; stroke-width:2; fill:none; }

/* TABLE */
.table-wrap{
  max-width: 1200px; margin: 0 auto;
  padding: 0 clamp(1.4rem,5vw,2.5rem);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
table{ width:100%; border-collapse: collapse; }
thead tr{ border-bottom: 1px solid var(--gold-line); }
th{
  font-family: var(--caps); font-size: .48rem;
  letter-spacing: .42em; color: var(--gold);
  opacity: .65;
  padding: .9rem 1rem; text-align:left; font-weight:400;
  white-space: nowrap;
}
th:last-child{ text-align: center; }
tbody tr{
  border-bottom: 1px solid rgba(201,168,76,.06);
  transition: background .2s;
}
tbody tr:hover{ background: rgba(201,168,76,.03); }
td{
  padding: .95rem 1rem;
  font-family: var(--serif); font-size: 1rem;
  color: var(--champagne);
  vertical-align: middle;
}
td.td-num{
  font-family: var(--caps); font-size: .55rem;
  letter-spacing: .12em;
  color: rgba(201,168,76,.42);
  font-variant-numeric: tabular-nums;
}
td.td-name{ font-size: 1.05rem; }
td.td-table{
  font-family: var(--caps); font-size: .55rem;
  letter-spacing: .25em;
  color: rgba(240,230,211,.5);
}
td.td-meta{
  display:block;
  font-family: var(--caps); font-size: .4rem;
  letter-spacing: .25em;
  color: rgba(201,168,76,.55);
  margin-top: 3px;
}
td.td-fecha{
  display:block;
  font-family: var(--caps); font-size: .38rem;
  letter-spacing: .2em;
  color: rgba(240,230,211,.22);
  margin-top: 3px;
}

.badge{
  display:inline-flex; align-items:center; gap:.4rem;
  padding: .3rem .8rem;
  border-radius: 20px;
  font-family: var(--caps); font-size: .45rem;
  letter-spacing: .32em; white-space: nowrap;
}
.badge::before{
  content:''; width:5px; height:5px; border-radius:50%;
  background: currentColor; opacity:.85;
}
.badge-yes{ background: rgba(126,196,154,.12); color: var(--green); border:1px solid rgba(126,196,154,.25); }
.badge-no{ background: rgba(196,128,128,.12); color: var(--red);   border:1px solid rgba(196,128,128,.25); }
.badge-pending{ background: rgba(201,168,76,.08); color: rgba(201,168,76,.7); border:1px solid var(--gold-line); }

.score-bar{ display:flex; align-items:center; gap:.6rem; min-width:120px; }
.score-mini{ height:3px; border-radius:2px; background: rgba(201,168,76,.1); flex:1; min-width:60px; overflow:hidden; }
.score-mini-fill{ height:100%; border-radius:2px; background: linear-gradient(90deg, var(--gold), var(--gold-2)); }
.score-val{
  font-family: var(--serif); font-size: .92rem;
  color: var(--gold); min-width: 38px; text-align:right;
  font-variant-numeric: tabular-nums;
}
.no-score{
  font-family: var(--serif); font-style: italic;
  font-size: .82rem; color: rgba(240,230,211,.22);
}

.empty-state{
  text-align:center; padding: 3rem 1rem;
  font-family: var(--serif); font-style:italic;
  font-size: 1rem; color: rgba(240,230,211,.25);
}
.empty-state.error{ color: rgba(196,128,128,.6); }
.empty-state svg{
  width:36px; height:36px; margin: 0 auto 1rem;
  display:block; opacity:.4;
  stroke: currentColor; stroke-width:1; fill:none;
}

/* RESPONSIVE */
@media(max-width:600px){
  th:nth-child(3), td:nth-child(3){ display:none; }
  .search-input{ width: 150px; }
  td{ font-size:.95rem; }
}

@media (prefers-reduced-motion: reduce){
  .bg-silk, .stat-card::before, .login-card::after, .progress-fill::after{ animation:none; }
}
</style>
</head>
<body>

<!-- BG -->
<div class="bg" aria-hidden="true">
  <div class="bg-silk"></div>
  <div class="bg-grain"></div>
  <div class="bg-vignette"></div>
</div>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="loginScreen">
  <p class="login-eyebrow">PANEL PRIVADO</p>
  <div class="login-mono">S<span class="amp">&amp;</span>A</div>
  <div class="login-rule"></div>
  <p class="login-sub">Acceso solo para los novios</p>

  <div class="login-card">
    <span class="login-label">CONTRASEÑA</span>
    <input class="login-input" type="password" id="pwInput" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')checkLogin()">
    <button class="login-btn" onclick="checkLogin()">INGRESAR</button>
    <p class="login-err" id="loginErr">Contraseña incorrecta</p>
  </div>

  <p class="login-hint">14 · 06 · 2025</p>
</div>

<!-- ══════════════════ DASHBOARD ══════════════════ -->
<div id="dashboard">

  <header class="dash-header">
    <div class="dash-header-inner">
      <span class="dash-logo">S<span class="amp">&amp;</span>A</span>
      <div class="dash-title-wrap">
        <p class="dash-eyebrow">PANEL PRIVADO</p>
        <h1 class="dash-heading">Lista de Invitados</h1>
        <p class="dash-date">14 · 06 · 2025</p>
      </div>
      <div class="header-actions">
        <a href="mesas.html" class="header-btn primary">MESAS &nbsp;→</a>
        <button class="header-btn" onclick="logout()">SALIR</button>
      </div>
    </div>
  </header>

  <div class="stats-strip">
    <div class="stat-card">
      <div class="stat-icon"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.5"/><path d="M3 21 c0-3.3 2.7-6 6-6 s6 2.7 6 6"/><circle cx="17" cy="9" r="3"/><path d="M14 16 c2-1.5 7-1 7 5"/></svg></div>
      <span class="stat-num" id="statTotal">--</span>
      <span class="stat-lbl">INVITADOS</span>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="color:var(--green)"><svg viewBox="0 0 24 24"><path d="M9 11 v8 M15 11 v8 M9 11 a3 3 0 0 1 0-6 a3 3 0 0 1 0 6 M15 11 a3 3 0 0 1 0-6 a3 3 0 0 1 0 6 M6 19 h12"/></svg></div>
      <span class="stat-num green" id="statYes">0</span>
      <span class="stat-lbl">CONFIRMAN</span>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="color:var(--red)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9 l6 6 M15 9 l-6 6"/></svg></div>
      <span class="stat-num red" id="statNo">0</span>
      <span class="stat-lbl">NO ASISTEN</span>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="color:var(--gold)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7 v5 l3.5 2"/></svg></div>
      <span class="stat-num amber" id="statPending">0</span>
      <span class="stat-lbl">PENDIENTES</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>CONFIRMACIONES</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="controls">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all',this)">TODOS</button>
      <button class="filter-tab" onclick="setFilter('yes',this)">CONFIRMAN</button>
      <button class="filter-tab" onclick="setFilter('no',this)">NO ASISTEN</button>
      <button class="filter-tab" onclick="setFilter('pending',this)">PENDIENTES</button>
      <button class="filter-tab" onclick="setFilter('trivia',this)">CON TRIVIA</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon"><svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg></span>
      <input class="search-input" type="text" placeholder="Buscar invitado…" oninput="filterSearch(this.value)" id="searchInput">
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>NOMBRE</th>
          <th>MESA</th>
          <th>RSVP</th>
          <th>TRIVIA</th>
        </tr>
      </thead>
      <tbody id="guestTableBody"></tbody>
    </table>
  </div>

</div>

<script>
/* ══ LOGIN ══ */
const PASSWORD = 'sofia2025'; // ← cambiá por la contraseña real

function checkLogin(){
  const val = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  if (val === PASSWORD) {
    document.getElementById('loginScreen').classList.add('hide');
    setTimeout(() => {
      document.getElementById('loginScreen').style.display = 'none';
      const dash = document.getElementById('dashboard');
      dash.style.display = 'block';
      dash.classList.add('vis');
      initDashboard();
    }, 850);
  } else {
    err.classList.add('vis');
    document.getElementById('pwInput').value = '';
    setTimeout(() => err.classList.remove('vis'), 2500);
  }
}

function logout(){
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('dashboard').classList.remove('vis');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginScreen').classList.remove('hide');
  document.getElementById('pwInput').value = '';
}

/* ══ DATA — Google Sheet ══ */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzh9bZxBXH6qZGRH_VYmUhJ5xS-NmA8JZmFb7RkjtjI_3uWPvs6HzdZX97qrNnCCdGuow/exec';

let allGuests     = [];
let currentFilter = 'all';
let currentSearch = '';
let refreshTimer  = null;

function initDashboard(){
  showLoading();
  fetch(SHEET_URL + '?action=all')
    .then(r => r.json())
    .then(data => {
      allGuests = Array.isArray(data) ? data : [];
      updateStats();
      renderTable();
      animateProgress();
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(refreshData, 60000);
    })
    .catch(() => showError());
}

function refreshData(){
  fetch(SHEET_URL + '?action=all')
    .then(r => r.json())
    .then(data => {
      if (Array.isArray(data)) {
        allGuests = data;
        updateStats();
        renderTable();
        animateProgress();
      }
    }).catch(()=>{});
}

function showLoading(){
  document.getElementById('guestTableBody').innerHTML = `
    <tr><td colspan="5">
      <div class="empty-state">
        <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="10"/><path d="M16 8 v8 l5 3"/></svg>
        Cargando invitados…
      </div>
    </td></tr>`;
}

function showError(){
  document.getElementById('guestTableBody').innerHTML = `
    <tr><td colspan="5">
      <div class="empty-state error">
        <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="13"/><path d="M11 11 l10 10 M21 11 l-10 10"/></svg>
        No se pudo conectar con el Sheet.<br>Verificá que el Apps Script esté publicado.
      </div>
    </td></tr>`;
}

function updateStats(){
  const yes     = allGuests.filter(g => g.asistencia === 'Confirma').length;
  const no      = allGuests.filter(g => g.asistencia === 'No asiste').length;
  const pending = allGuests.filter(g => !g.asistencia || g.asistencia === 'Pendiente').length;
  document.getElementById('statTotal').textContent   = allGuests.length;
  document.getElementById('statYes').textContent     = yes;
  document.getElementById('statNo').textContent      = no;
  document.getElementById('statPending').textContent = pending;
}

function animateProgress(){
  const yes = allGuests.filter(g => g.asistencia === 'Confirma').length;
  const pct = allGuests.length ? Math.round(yes / allGuests.length * 100) : 0;
  setTimeout(() => {
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent  = pct + '%';
  }, 250);
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}
function filterSearch(val){ currentSearch = val.toLowerCase(); renderTable(); }

function renderTable(){
  let data = [...allGuests];
  if (currentFilter === 'yes')     data = data.filter(g => g.asistencia === 'Confirma');
  if (currentFilter === 'no')      data = data.filter(g => g.asistencia === 'No asiste');
  if (currentFilter === 'pending') data = data.filter(g => !g.asistencia || g.asistencia === 'Pendiente');
  if (currentFilter === 'trivia')  data = data.filter(g => g.trivia !== null && g.trivia !== '' && g.trivia !== undefined);
  if (currentSearch) data = data.filter(g => (g.nombre||'').toLowerCase().includes(currentSearch));

  const tbody = document.getElementById('guestTableBody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">Sin resultados</div></td></tr>`;
    return;
  }

  tbody.innerHTML = data.map((g, i) => {
    const rsvp = g.asistencia || 'Pendiente';
    const badge = rsvp === 'Confirma'
      ? `<span class="badge badge-yes">CONFIRMA</span>`
      : rsvp === 'No asiste'
      ? `<span class="badge badge-no">NO ASISTE</span>`
      : `<span class="badge badge-pending">PENDIENTE</span>`;

    const menuHtml = g.menu && g.menu !== 'Estándar' && g.menu !== '-' && g.menu !== ''
      ? `<span class="td-meta">${g.menu}</span>`
      : '';
    const mesa  = g.mesa ? `MESA ${g.mesa}` : '—';
    const trivia = (g.trivia !== null && g.trivia !== '' && g.trivia !== undefined)
      ? `<div class="score-bar"><div class="score-mini"><div class="score-mini-fill" style="width:${g.trivia*10}%"></div></div><span class="score-val">${g.trivia}/10</span></div>`
      : `<span class="no-score">—</span>`;
    const fecha = g.fecha ? `<span class="td-fecha">${g.fecha}</span>` : '';

    return `<tr>
      <td class="td-num">${String(i+1).padStart(2,'0')}</td>
      <td class="td-name">${g.nombre || '—'}${fecha}</td>
      <td class="td-table">${mesa}</td>
      <td>${badge}${menuHtml}</td>
      <td>${trivia}</td>
    </tr>`;
  }).join('');
}

// Auto-focus password input
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('pwInput')?.focus(), 400);
});
</script>
</body>
</html>
