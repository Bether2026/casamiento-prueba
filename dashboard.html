<style>

  body { background: var(--deep); font-family: 'Montserrat', sans-serif; overflow-x: hidden; min-height: 100vh; }

  /* ── LOGIN SCREEN ── */
  #loginScreen {
    position: fixed; inset: 0; z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;

  #loginScreen.hide { opacity: 0; transform: scale(1.04); pointer-events: none; }
  .login-mono { font-family: 'Cormorant Garamond', serif; font-size: 4rem; color: var(--gold); opacity: 0.4; font-style: italic; margin-bottom: 0.3rem; }
  .login-title { font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.5em; color: var(--gold); margin-bottom: 0.5rem; opacity: 0.7; }
  .login-subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--champagne); opacity: 0.45; margin-bottom: 2.5rem; letter-spacing: 0.05em; }
  .login-box { background: rgba(201,168,76,0.04); border: 1px solid rgba(201,168,76,0.18); border-radius: 3px; padding: 2.2rem 2.5rem; width: min(360px, 88vw); text-align: center; }

  .login-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.22); border-radius: 2px; padding: 0.75rem 1rem; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--champagne); text-align: center; letter-spacing: 0.3em; outline: none; transition: border-color 0.3s; }

  .login-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .login-err { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.88rem; color: #c06060; margin-top: 0.8rem; opacity: 0; transition: opacity 0.3s; }

// ═══ CANVAS BG ═══
try {
  const c = document.getElementById('bgCanvas');
  const x = c.getContext('2d');
  let W, H, t = 0;
  const resize = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
  resize(); window.addEventListener('resize', resize);
  const S = [];
  for (let i = 0; i < 90; i++) S.push({ px:Math.random(), py:Math.random(), r:.28+Math.random()*.85, sp:.00005+Math.random()*.00012, ph:Math.random()*Math.PI*2, g:Math.random()>.72 });
  function frame() {
    t += .003; x.clearRect(0,0,W,H);
    const bg = x.createRadialGradient(W*.5,H*.38,0,W*.5,H*.5,W*.9);
    bg.addColorStop(0,'#1a1007'); bg.addColorStop(.55,'#0e0904'); bg.addColorStop(1,'rgba(4,3,1,0)');
    x.fillStyle = bg; x.fillRect(0,0,W,H);
    S.forEach(s => {
      const px=((s.px+t*s.sp)%1)*W, py=s.py*H, tw=.38+.62*Math.sin(t*3.2+s.ph);
      x.beginPath(); x.arc(px,py,s.r,0,Math.PI*2);
      x.fillStyle=s.g?`rgba(232,201,120,${.45*tw})`:`rgba(255,250,242,${.35*tw})`; x.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
} catch(e) {}

// ═══ LOGIN ═══
const PASSWORD = 'sofia2025'; // Cambiar por la contraseña real

function checkLogin() {
  const val = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  if (val === PASSWORD) {
    document.getElementById('loginScreen').classList.add('hide');
    setTimeout(() => {
      document.getElementById('loginScreen').style.display = 'none';
      const dash = document.getElementById('dashboard');
      dash.style.display = 'block';
      dash.classList.add('vis');
      initDashboard();
    }, 850);
  } else {
    err.classList.add('vis');
    document.getElementById('pwInput').value = '';
    setTimeout(() => err.classList.remove('vis'), 2500);
  }
}

function logout() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('dashboard').classList.remove('vis');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginScreen').classList.remove('hide');
  document.getElementById('pwInput').value = '';
}

let currentFilter = 'all';
let currentSearch = '';

function initDashboard() {
  updateStats();
  renderTable();
  setTimeout(() => {
    const yes = guests.filter(g => g.rsvp === 'yes').length;
    const pct = Math.round(yes / guests.length * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
  }, 300);
}

function updateStats() {
  const yes = guests.filter(g => g.rsvp === 'yes').length;
  const no  = guests.filter(g => g.rsvp === 'no').length;
  const pending = guests.filter(g => g.rsvp === 'pending').length;
  document.getElementById('statTotal').textContent = guests.length;
  document.getElementById('statYes').textContent = yes;
  document.getElementById('statNo').textContent = no;
  document.getElementById('statPending').textContent = pending;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function filterSearch(val) {
  currentSearch = val.toLowerCase();
  renderTable();
}

function renderTable() {
  let data = [...guests];

  if (currentFilter === 'yes')     data = data.filter(g => g.rsvp === 'yes');
  if (currentFilter === 'no')      data = data.filter(g => g.rsvp === 'no');
  if (currentFilter === 'pending') data = data.filter(g => g.rsvp === 'pending');
  if (currentFilter === 'trivia')  data = data.filter(g => g.trivia !== null);

  if (currentSearch) {
    data = data.filter(g => g.name.toLowerCase().includes(currentSearch));
  }

  const tbody = document.getElementById('guestTableBody');

  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:2.5rem;font-style:italic;color:rgba(240,230,211,0.25);font-family:'Cormorant Garamond',serif">Sin resultados</td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(g => {
    const badge = g.rsvp === 'yes'
      ? `<span class="badge badge-yes">✦ Confirma</span>`
      : g.rsvp === 'no'
      ? `<span class="badge badge-no">✕ No asiste</span>`
      : `<span class="badge badge-pending">· Pendiente</span>`;

    const scoreHtml = g.trivia !== null
      ? `<div class="score-bar">
           <div class="score-mini"><div class="score-mini-fill" style="width:${g.trivia * 10}%"></div></div>
           <span class="score-val">${g.trivia}/10</span>
         </div>`
      : `<span class="no-score">—</span>`;

    return `<tr>
      <td class="td-num">${g.id}</td>
      <td class="td-name">${g.name}</td>
      <td class="td-table">MESA ${g.table}</td>
      <td>${badge}</td>
      <td>${scoreHtml}</td>
    </tr>`;
  }).join('');
}

// Enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none' && !document.getElementById('loginScreen').classList.contains('hide')) {
    checkLogin();
  }
});
