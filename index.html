<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofía & Andrés — 14 Junio 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --champagne: #f0e6d3;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --ivory: #faf7f2;
            --deep: #0d0905;
            --ink: #2d2418;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--deep); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* Fondo y Pétalos */
        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        #petals { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }

        /* Botón Música */
        #musicBtn {
            position: fixed; bottom: 1.4rem; right: 1.4rem; z-index: 400;
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(8,5,1,0.65); border: 1px solid rgba(201,168,76,0.32);
            color: var(--gold); font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; backdrop-filter: blur(10px);
        }

        /* SOBRE (Envelope) */
        #envScreen {
            position: fixed; inset: 0; z-index: 200;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--deep); /* Asegura que el fondo sea oscuro al inicio */
            transition: opacity 1s ease, visibility 1s;
        }
        #envScreen.hide { opacity: 0; visibility: hidden; pointer-events: none; }

        .env-label { font-family: 'Cormorant Garamond',serif; font-style: italic; font-size: 0.9rem; color: var(--gold); letter-spacing: 0.4em; margin-bottom: 0.5rem; }
        .env-name { font-family: 'Cormorant Garamond',serif; font-weight: 300; font-size: clamp(1.7rem, 5vw, 2.9rem); color: var(--champagne); text-align: center; margin-bottom: 2.5rem; }
        
        .env-wrap { position: relative; cursor: pointer; width: min(340px, 82vw); transition: transform 0.4s; }
        .env-body { position: relative; width: 100%; padding-bottom: 63%; }
        .env-body svg { position: absolute; inset: 0; width: 100%; height: 100%; }
        
        .env-flap { transform-origin: 50% 0%; transition: transform 0.8s cubic-bezier(.4,0,.2,1); }
        .env-wrap.open .env-flap { transform: rotateX(-180deg); }

        .env-hint { margin-top: 2rem; font-family: 'Cormorant Garamond',serif; font-style: italic; color: var(--gold); opacity: 0.6; animation: breathe 2s infinite; }
        @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

        /* INVITACIÓN (Contenido) */
        #invitation { 
            display: none; /* Oculto hasta que se abra el sobre */
            background: var(--ivory); 
            position: relative; 
            z-index: 2; 
        }
        #invitation.vis { display: block; animation: fadeIn 1.5s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Secciones */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--deep); color: white; position: relative; }
        .hero-names { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 8vw, 5rem); text-align: center; color: var(--champagne); }
        .hero-date { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 0.4em; margin-top: 1rem; }

        .countdown-section { padding: 4rem 1rem; text-align: center; background: var(--champagne); }
        .countdown-grid { display: flex; justify-content: center; gap: 1rem; margin-top: 2rem; }
        .countdown-num { font-family: 'Cormorant Garamond', serif; font-size: 3rem; display: block; color: var(--ink); }
        .countdown-label { font-size: 0.7rem; color: var(--gold); font-family: 'Cinzel', serif; }
        
        .gold-rule { width: 60px; height: 1px; background: var(--gold); margin: 1rem auto; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="petals"></div>
    <button id="musicBtn" onclick="toggleMusic()">♫</button>

    <div id="envScreen">
        <p class="env-label">Para</p>
        <h1 class="env-name">María Fernanda García</h1>
        
        <div class="env-wrap" id="envWrap" onclick="openEnvelope()">
            <div class="env-body">
                <svg viewBox="0 0 400 252">
                    <rect x="0" y="0" width="400" height="252" fill="#ece0c6" rx="5"/>
                    <path d="M0 0 L200 130 L400 0" fill="#f7eedf" class="env-flap"/>
                    <text x="200" y="200" text-anchor="middle" font-family="serif" font-style="italic" fill="#c9a84c" font-size="14">S & A</text>
                </svg>
            </div>
        </div>
        
        <p class="env-hint">— toca para abrir —</p>
    </div>

    <div id="invitation">
        <section class="hero">
            <h2 class="hero-names">Sofía & Andrés</h2>
            <div class="gold-rule"></div>
            <p class="hero-date">14 · JUNIO · 2026</p>
        </section>

        <section class="countdown-section">
            <p class="section-label">CUENTA REGRESIVA</p>
            <div class="gold-rule"></div>
            <div class="countdown-grid">
                <div class="countdown-item"><span class="countdown-num" id="cd-d">00</span><span class="countdown-label">DÍAS</span></div>
                <div class="countdown-item"><span class="countdown-num" id="cd-h">00</span><span class="countdown-label">HORAS</span></div>
                <div class="countdown-item"><span class="countdown-num" id="cd-m">00</span><span class="countdown-label">MIN</span></div>
                <div class="countdown-item"><span class="countdown-num" id="cd-s">00</span><span class="countdown-label">SEG</span></div>
            </div>
        </section>
    </div>

    <script>
        // 1. Abrir sobre
        function openEnvelope() {
            const wrap = document.getElementById('envWrap');
            const screen = document.getElementById('envScreen');
            const inv = document.getElementById('invitation');

            wrap.classList.add('open'); // Activa animación de la solapa
            
            setTimeout(() => {
                screen.classList.add('hide'); // Desvanece el sobre
                inv.classList.add('vis');    // Muestra la invitación
            }, 1200);
        }

        // 2. Cuenta Regresiva 2026
        const targetDate = new Date("June 14, 2026 14:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById("cd-d").innerText = d;
                document.getElementById("cd-h").innerText = h;
                document.getElementById("cd-m").innerText = m;
                document.getElementById("cd-s").innerText = s;
            }
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // 3. Música (opcional si tienes el archivo)
        function toggleMusic() {
            alert("Aquí puedes conectar tu archivo de audio");
        }
    </script>
</body>
</html>
