<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofía & Andrés — 14 Junio 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --champagne: #f0e6d3;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --ivory: #faf7f2;
    --deep: #0d0905;
    --ink: #2d2418;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--deep); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

#petals { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.petal {
position: absolute; top: -30px;
width: var(--sz); height: var(--sz);
border-radius: 50% 0 50% 0;
background: radial-gradient(ellipse at 35% 35%, rgba(232,196,184,0.5), rgba(201,168,76,0.15));
animation: petalFall var(--dur) linear var(--delay) infinite;
}
@keyframes petalFall {
0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
6%   { opacity: 0.7; }
94%  { opacity: 0.2; }
100% { transform: translateY(110vh) translateX(var(--drift)) rotate(var(--spin)); opacity: 0; }
}

#musicBtn {
position: fixed; bottom: 1.4rem; right: 1.4rem; z-index: 400;
width: 38px; height: 38px; border-radius: 50%;
background: rgba(8,5,1,0.65); border: 1px solid rgba(201,168,76,0.32);
color: var(--gold); font-size: 0.9rem; cursor: pointer;
display: none; align-items: center; justify-content: center;
transition: all 0.3s; backdrop-filter: blur(10px);
}
#musicBtn.vis { display: flex; }
#musicBtn:hover { background: rgba(201,168,76,0.16); border-color: var(--gold); }

/* ── ENVELOPE ── */
#envScreen {
position: fixed; inset: 0; z-index: 200;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
transition: opacity 1.4s ease, transform 1.4s ease;
}
#envScreen.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }
.env-label { font-family: 'Cormorant Garamond',serif; font-style: italic; font-size: clamp(0.78rem,2vw,0.92rem); color: var(--gold); letter-spacing: 0.42em; margin-bottom: 0.4rem; opacity: 0.72; }
.env-name { font-family: 'Cormorant Garamond',serif; font-weight: 300; font-size: clamp(1.7rem,5vw,2.9rem); color: var(--champagne); letter-spacing: 0.06em; margin-bottom: 2.8rem; text-align: center; padding: 0 1.5rem; }
.env-wrap { position: relative; cursor: pointer; width: min(340px,82vw); filter: drop-shadow(0 20px 55px rgba(201,168,76,0.2)); transition: filter 0.35s; }
.env-wrap:hover { filter: drop-shadow(0 26px 75px rgba(201,168,76,0.35)); }
.env-body { position: relative; width: 100%; padding-bottom: 63%; }
.env-body svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.env-flap { transform-origin: 50% 0%; transform-box: fill-box; transition: transform 0.85s cubic-bezier(.4,0,.2,1); }
.env-wrap.open .env-flap { transform: rotateX(-175deg); }
.env-letter { position: absolute; left: 12%; right: 12%; bottom: 6%; height: 80%; z-index: -1; background: linear-gradient(150deg,#faf6ee,#ede0c6); border-radius: 2px; transform: scaleY(0.015); transform-origin: bottom; box-shadow: 0 -2px 18px rgba(0,0,0,0.12); transition: transform 0.75s cubic-bezier(.22,1,.36,1) 0.55s; display: flex; align-items: center; justify-content: center; }
.env-wrap.open .env-letter { transform: scaleY(1) translateY(-62%); }
.env-letter-inner { font-family: 'Cormorant Garamond',serif; font-style: italic; font-size: 1rem; color: rgba(44,36,24,0.4); letter-spacing: 0.08em; opacity: 0; transition: opacity 0.4s ease 1s; }
.env-wrap.open .env-letter-inner { opacity: 1; }
.env-seal { position: absolute; width: 64px; height: 64px; top: 50%; left: 50%; transform: translate(-50%,-38%); transition: opacity 0.4s 0.1s, transform 0.4s 0.1s; pointer-events: none; }
.env-wrap.open .env-seal { opacity: 0; transform: translate(-50%,-38%) scale(0.6); }
.env-hint { margin-top: 2rem; font-family: 'Cormorant Garamond',serif; font-style: italic; font-size: 0.88rem; color: var(--gold); opacity: 0.6; letter-spacing: 0.22em; animation: breathe 2.8s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:0.75} }

/* ── INVITATION ── */
#invitation { min-height: 100vh; background: var(--ivory); opacity: 0; transform: translateY(26px); transition: opacity 1.1s ease 0.3s, transform 1.1s ease 0.3s; pointer-events: none; position: relative; z-index: 2; }
#invitation.vis { opacity: 1; transform: translateY(0); pointer-events: all; }

/* ── HERO ── */
.hero { position: relative; height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; background: var(--deep); }
.hero-corners { position: absolute; inset: clamp(1.2rem,3vw,2rem); pointer-events: none; background: linear-gradient(var(--gold),var(--gold)) top left / 22px 1px no-repeat, linear-gradient(var(--gold),var(--gold)) top left / 1px 22px no-repeat, linear-gradient(var(--gold),var(--gold)) top right / 22px 1px no-repeat, linear-gradient(var(--gold),var(--gold)) top right / 1px 22px no-repeat, linear-gradient(var(--gold),var(--gold)) bottom left / 22px 1px no-repeat, linear-gradient(var(--gold),var(--gold)) bottom left / 1px 22px no-repeat, linear-gradient(var(--gold),var(--gold)) bottom right / 22px 1px no-repeat, linear-gradient(var(--gold),var(--gold)) bottom right / 1px 22px no-repeat; opacity: 0.35; }
.hero-frame { position: absolute; inset: clamp(1.2rem,3vw,2rem); border: 1px solid rgba(201,168,76,0.08); pointer-events: none; }
.hero-mono { font-family: 'Cinzel',serif; font-size: clamp(4rem,13vw,9rem); color: transparent; -webkit-text-stroke: 1px rgba(201,168,76,0.38); letter-spacing: 0.1em; line-height: 1; margin-bottom: 1.4rem; opacity: 0; animation: riseIn 1.4s ease 0.4s forwards; }
.hero-amp { font-family: 'Cormorant Garamond',serif; font-style: italic; font-size: clamp(2.2rem,7vw,4.5rem); color: var(--gold); display: block; line-height: 0.8; }
.hero-names { font-family: 'Cormorant Garamond',serif; font-size: clamp(2.6rem,8vw,5.5rem); color: var(--champagne); font-weight: 300; text-align: center; line-height: 1.1; letter-spacing: 0.06em; opacity: 0; animation: riseIn 1.4s ease 0.7s forwards; }
.hero-rule { width: 90px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold),transparent); margin: 1.4rem auto; opacity: 0; animation: riseIn 1.4s ease 0.95s forwards; }
.hero-date { font-family: 'Cinzel',serif; font-size: clamp(0.62rem,1.8vw,0.8rem); color: var(--gold); letter-spacing: 0.5em; opacity: 0; animation: riseIn 1.4s ease 1.1s forwards; }
.hero-phrase { font-family: 'Cormorant Garamond',serif; font-style: italic; font-size: clamp(0.9rem,2.3vw,1.12rem); color: var(--champagne); text-align: center; padding: 0 2rem; line-height: 1.7; margin-top: 1.2rem; opacity: 0; animation: riseIn 1.4s ease 1.3s forwards; }
.scroll-cue { position: absolute; bottom: 1.8rem; display: flex; flex-direction: column; align-items: center; gap: 0.45rem; opacity: 0; animation: riseIn 1s ease 2.2s forwards; }
.scroll-cue span { font-family: 'Cinzel',serif; font-size: 0.52rem; letter-spacing: 0.4em; color: var(--gold); opacity: 0.5; }
.scroll-line { width: 1px; height: 34px; background: linear-gradient(var(--gold),transparent); animation: sline 2s ease-in-out infinite; }
@keyframes sline { 0%{transform:scaleY(0);transform-origin:top} 50%{transform:scaleY(1);transform-origin:top} 51%{transform-origin:bottom} 100%{transform:scaleY(0);transform-origin:bottom} }
@keyframes riseIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* ── SHARED ── */
.section { padding: clamp(3.5rem,9vw,6.5rem) clamp(1.5rem,5vw,3rem); max-width: 900px; margin: 0 auto; }
.section-label { font-family: 'Cinzel',serif; font-size: 0.58rem; letter-spacing: 0.5em; color: var(--gold); text-align: center; margin-bottom: 0.7rem; opacity: 0.8; }
.section-title { font-family: 'Cormorant Garamond',serif; font-size: clamp(1.9rem,5vw,3.1rem); color: var(--ink); font-weight: 300; text-align: center; line-height: 1.2; }
.section-title em { color: var(--gold); font-style: italic; }

.gold-rule {
width: 65px; height: 1px; margin: 1.3rem auto 2.3rem;
position: relative; overflow: visible;
background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
}
.gold-rule::before {
content: '';
position: absolute; top: 0; width: 55%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(232,201,120,1), transparent);
animation: ruleSweep 3.5s ease-in-out infinite;
}
.gold-rule::after {
content: '✦';
position: absolute; top: 50%; left: 50%;
transform: translate(-50%,-50%);
font-size: 0.4rem; color: var(--gold); line-height: 1;
animation: ruleStar 3.5s ease-in-out infinite;
}
@keyframes ruleSweep { 0%{left:-60%;opacity:0} 20%{opacity:1} 80%{opacity:1} 100%{left:160%;opacity:0} }
@keyframes ruleStar { 0%,100%{opacity:0.2;transform:translate(-50%,-50%) scale(0.6)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)} }

/* ── CAROUSEL ── */
.carousel-section { background: var(--deep); padding: clamp(3.5rem,9vw,6.5rem) 0; }
.carousel-section .section-title { color: var(--champagne); }
.carousel-track-wrap { overflow: hidden; margin-top: 2.2rem; }
.carousel-track { display: flex; gap: 1.1rem; padding: 0 1.5rem; transition: transform 0.65s cubic-bezier(.4,0,.2,1); }
.carousel-slide { flex: 0 0 min(295px,76vw); border-radius: 3px; overflow: hidden; position: relative; aspect-ratio: 3/4; background: #1a1208; }
.carousel-slide img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease; opacity: 0.82; }
.carousel-slide:hover img { transform: scale(1.04); opacity: 1; }
.slide-caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 3rem 1.2rem 1.2rem; background: linear-gradient(transparent,rgba(8,5,1,.88)); font-family: 'Cormorant Garamond',serif; font-style: italic; font-size: 0.98rem; color: var(--champagne); text-align: center; }
.carousel-controls { display: flex; align-items: center; justify-content: center; gap: 1.4rem; margin-top: 1.6rem; }
.carousel-btn { width: 38px; height: 38px; border: 1px solid rgba(201,168,76,0.32); background: transparent; color: var(--gold); border-radius: 50%; cursor: pointer; font-size: 0.95rem; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
.carousel-btn:hover { background: rgba(201,168,76,0.11); border-color: var(--gold); }
.carousel-dots { display: flex; gap: 0.42rem; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(201,168,76,0.26); cursor: pointer; transition: all 0.35s; }
.dot.active { background: var(--gold); width: 17px; border-radius: 3px; }

/* ── QUOTE ── */
.quote-section { background: var(--champagne); padding: clamp(3.5rem,9vw,6.5rem) clamp(2rem,8vw,7rem); text-align: center; position: relative; overflow: hidden; }
.quote-section::before { content: '"'; position: absolute; top: -1.5rem; left: 0.5rem; font-family: 'Cormorant Garamond',serif; font-size: 14rem; color: var(--gold); opacity: 0.06; line-height: 1; pointer-events: none; }
.quote-text { font-family: 'Cormorant Garamond',serif; font-size: clamp(1.35rem,4vw,2rem); color: var(--ink); font-style: italic; font-weight: 300; line-height: 1.65; max-width: 580px; margin: 0 auto; position: relative; }
.quote-author { margin-top: 1.4rem; font-family: 'Cinzel',serif; font-size: 0.58rem; letter-spacing: 0.45em; color: var(--gold); }

/* ── VIDEO ── */
.video-section { background: var(--deep); padding: clamp(3.5rem,9vw,6.5rem) 1.5rem; }
.video-section .section-title { color: var(--champagne); }
.video-wrap { position: relative; max-width: 720px; margin: 2.2rem auto 0; border-radius: 3px; overflow: hidden; aspect-ratio: 16/9; box-shadow: 0 0 0 1px rgba(201,168,76,0.16), 0 28px 75px rgba(0,0,0,0.6); }
.video-wrap iframe { width: 100%; height: 100%; border: 0; }

/* ── CEREMONY ── */
.ceremony-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(195px,1fr)); gap: 1.4rem; margin-top: 2.2rem; }
.ceremony-card { text-align: center; padding: 2rem 1.4rem; border: 1px solid rgba(201,168,76,0.17); border-radius: 2px; background: rgba(201,168,76,0.025); transition: all 0.35s; }
.ceremony-card:hover { border-color: rgba(201,168,76,0.44); background: rgba(201,168,76,0.05); transform: translateY(-3px); }
.ceremony-icon { font-size: 1.5rem; margin-bottom: 0.8rem; display: block; }
.ceremony-card h3 { font-family: 'Cinzel',serif; font-size: 0.62rem; letter-spacing: 0.4em; color: var(--gold); margin-bottom: 0.65rem; }
.ceremony-card p { font-family: 'Cormorant Garamond',serif; font-size: 1.02rem; color: var(--ink); line-height: 1.5; }

/* ── BUTTONS ── */
.btn-group { display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center; margin-top: 2.2rem; }
.btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.7rem; font-family: 'Cinzel',serif; font-size: 0.62rem; letter-spacing: 0.28em; text-decoration: none; cursor: pointer; border-radius: 2px; transition: all 0.3s; white-space: nowrap; }
.btn-primary { background: var(--gold); color: var(--deep); border: 1px solid var(--gold); }
.btn-primary:hover { background: var(--gold-light); border-color: var(--gold-light); transform: translateY(-2px); box-shadow: 0 7px 20px rgba(201,168,76,0.26); }
.btn-outline { background: transparent; color: var(--ink); border: 1px solid rgba(201,168,76,0.38); }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
.btn-outline-light { background: transparent; color: var(--champagne); border: 1px solid rgba(201,168,76,0.32); }
.btn-outline-light:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }

/* ── COUNTDOWN ── */
.countdown-section { background: var(--champagne); padding: clamp(3rem,8vw,5rem) 1.5rem; text-align: center; }
.countdown-grid { display: flex; gap: 1.1rem; justify-content: center; flex-wrap: wrap; margin-top: 1.8rem; }
.countdown-item { text-align: center; }
.countdown-num { font-family: 'Cormorant Garamond',serif; font-size: clamp(3rem,9vw,5.5rem); color: var(--ink); font-weight: 300; line-height: 1; display: block; transition: transform 0.15s
