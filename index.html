<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofía & Andrés — 14 Junio 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
/* MANTENGO TODO TU ESTILO ORIGINAL */
  :root {
    --champagne: #f0e6d3;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --ivory: #faf7f2;
    --deep: #0d0905;
    --ink: #2d2418;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--deep); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#petals { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }

/* ENVELOPE (SOBRE) */
#envScreen {
position: fixed; inset: 0; z-index: 200;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
transition: opacity 1.4s ease, transform 1.4s ease;
}
#envScreen.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }
.env-label { font-family: 'Cormorant Garamond',serif; font-style: italic; font-size: clamp(0.78rem,2vw,0.92rem); color: var(--gold); letter-spacing: 0.42em; margin-bottom: 0.4rem; opacity: 0.72; }
.env-name { font-family: 'Cormorant Garamond',serif; font-weight: 300; font-size: clamp(1.7rem,5vw,2.9rem); color: var(--champagne); letter-spacing: 0.06em; margin-bottom: 2.8rem; text-align: center; padding: 0 1.5rem; }
.env-wrap { position: relative; cursor: pointer; width: min(340px,82vw); filter: drop-shadow(0 20px 55px rgba(201,168,76,0.2)); transition: filter 0.35s; }
.env-body { position: relative; width: 100%; padding-bottom: 63%; }
.env-body svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.env-flap { transform-origin: 50% 0%; transition: transform 0.85s cubic-bezier(.4,0,.2,1); }
.env-wrap.open .env-flap { transform: rotateX(-175deg); }
.env-letter { position: absolute; left: 12%; right: 12%; bottom: 6%; height: 80%; z-index: -1; background: linear-gradient(150deg,#faf6ee,#ede0c6); transform: scaleY(0.015); transform-origin: bottom; transition: transform 0.75s cubic-bezier(.22,1,.36,1) 0.55s; }
.env-wrap.open .env-letter { transform: scaleY(1) translateY(-62%); }
.env-hint { margin-top: 2rem; font-family: 'Cormorant Garamond',serif; font-style: italic; font-size: 0.88rem; color: var(--gold); opacity: 0.6; animation: breathe 2.8s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:0.75} }

/* INVITATION */
#invitation { min-height: 100vh; background: var(--ivory); opacity: 0; transform: translateY(26px); transition: opacity 1.1s ease 0.3s, transform 1.1s ease 0.3s; pointer-events: none; position: relative; z-index: 2; }
#invitation.vis { opacity: 1; transform: translateY(0); pointer-events: all; }

/* HERO */
.hero { position: relative; height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--deep); }
.hero-names { font-family: 'Cormorant Garamond',serif; font-size: clamp(2.6rem,8vw,5.5rem); color: var(--champagne); text-align: center; }
.hero-date { font-family: 'Cinzel',serif; font-size: clamp(0.62rem,1.8vw,0.8rem); color: var(--gold); letter-spacing: 0.5em; margin-top: 1rem; }

/* COUNTDOWN */
.countdown-section { background: var(--champagne); padding: 4rem 1.5rem; text-align: center; }
.countdown-grid { display: flex; gap: 1.1rem; justify-content: center; margin-top: 1.8rem; }
.countdown-num { font-family: 'Cormorant Garamond',serif; font-size: clamp(2.5rem,7vw,4.5rem); color: var(--ink); }
.countdown-label { font-family: 'Cinzel',serif; font-size: 0.5rem; color: var(--gold); }

/* SECCIONES COMPARTIDAS */
.section { padding: 4rem 1.5rem; max-width: 900px; margin: 0 auto; text-align: center; }
.section-title { font-family: 'Cormorant Garamond',serif; font-size: 2.5rem; color: var(--ink); }
.gold-rule { width: 65px; height: 1px; background: var(--gold); margin: 1rem auto; }

/* Estilos para carrusel, botones, regalo, etc. que ya tenías */
.btn { display: inline-block; padding: 0.8rem 1.5rem; background: var(--gold); color: white; text-decoration: none; font-family: 'Cinzel'; font-size: 0.7rem; margin: 0.5rem; }
.regalo-card { border: 1px solid var(--gold); padding: 2rem; background: rgba(201,168,76,0.05); }
</style>
</head>
<body>

<div id="envScreen">
  <p class="env-label">Para</p>
  <h1 class="env-name">María Fernanda García</h1>
  <div class="env-wrap" id="envWrap" onclick="openEnvelope()">
    <div class="env-letter"></div>
    <div class="env-body">
      <svg viewBox="0 0 400 252">
        <rect x="6" y="6" width="388" height="240" rx="3" fill="#f7eedf" stroke="#c9a84c" stroke-width="0.5"/>
        <g class="env-flap"><path d="M6 6 L200 140 L394 6 Z" fill="#f2e6d0" stroke="#c9a84c" stroke-width="0.5"/></g>
        <text x="200" y="200" text-anchor="middle" font-family="serif" font-style="italic" fill="#c9a84c" font-size="14">S & A · 14.06.2026</text>
      </svg>
    </div>
  </div>
  <p class="env-hint">— toca para abrir —</p>
</div>

<div id="invitation">
  <section class="hero">
    <h2 class="hero-names">Sofía & Andrés</h2>
    <div class="gold-rule"></div>
    <p class="hero-date">14 · JUNIO · 2026</p>
  </section>

  <section class="section">
    <h2 class="section-title">Nuestra Historia</h2>
    <p>Momentos que nos unieron...</p>
    </section>

  <section class="countdown-section">
    <p class="section-label">CUENTA REGRESIVA</p>
    <div class="countdown-grid">
      <div class="countdown-item"><span class="countdown-num" id="cd-d">00</span><span class="countdown-label">DÍAS</span></div>
      <div class="countdown-item"><span class="countdown-num" id="cd-h">00</span><span class="countdown-label">HORAS</span></div>
      <div class="countdown-item"><span class="countdown-num" id="cd-m">00</span><span class="countdown-label">MIN</span></div>
      <div class="countdown-item"><span class="countdown-num" id="cd-s">00</span><span class="countdown-label">SEG</span></div>
    </div>
  </section>

  <section class="section">
     <h2 class="section-title">Regalo</h2>
     <div class="regalo-card">
        <p>Tu presencia es nuestro mejor regalo...</p>
     </div>
  </section>
</div>

<script>
// Lógica para abrir el sobre
function openEnvelope() {
  document.getElementById('envWrap').classList.add('open');
  setTimeout(() => {
    document.getElementById('envScreen').classList.add('hide');
    document.getElementById('invitation').classList.add('vis');
  }, 1200);
}

// LÓGICA DE FECHA CORREGIDA A 2026
const targetDate = new Date("June 14, 2026 14:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff > 0) {
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("cd-d").innerText = d;
    document.getElementById("cd-h").innerText = h;
    document.getElementById("cd-m").innerText = m;
    document.getElementById("cd-s").innerText = s;
  }
}
setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
